<script>
    const WEBHOOK = 'https://hook.us2.make.com/iq6ps3txx1jaxr91mje7sx47ynbta3kb';

    async function validar() {
        const folio = document.getElementById('folio').value.trim();
        const codigo = document.getElementById('codigo').value.trim();
        
        const payload = {
            folio: folio,
            codigoVerificacion: codigo
        };
        
        const btn = document.getElementById('btn-aceptar');
        btn.disabled = true;
        
        document.getElementById('spinner').classList.add('active');
        document.getElementById('result-box').classList.remove('visible');

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);

        try {
            const res = await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(payload),
                signal: controller.signal
            });
            
            clearTimeout(timeout);
            const data = await res.json();
            
            document.getElementById('spinner').classList.remove('active');
            
            const box = document.getElementById('result-box');
            const hdr = document.getElementById('result-header');
            const bdy = document.getElementById('result-body');
            
            if (data.found === true && data.pdf) {
                hdr.className = 'result-header';
                hdr.style.cssText = 'background: #f0fdf4; color: #166534; border: 1px solid #4caf50; border-bottom: none;';
                hdr.innerHTML = `<i class="fas fa-check-circle" style="color: #4caf50; font-size:1.2rem;"></i> <strong>El certificado es válido, verifique los datos en el documento generado</strong>`;
                
                // NUEVA LÓGICA DE PDF (Directo por Base64 URI)
                const base64Clean = data.pdf.replace(/^data:application\/pdf;base64,/, "");
                const pdfDataUri = "data:application/pdf;base64," + base64Clean;

                bdy.style.padding = '10px';
                bdy.innerHTML = `<iframe src="${pdfDataUri}" style="width:100%;height:750px;border:none;background:#fff;" title="Certificado PDF"></iframe>`;
                
            } else if (data.found === false) {
                hdr.className = 'result-header';
                hdr.style.cssText = 'background: #fdf3f2; color: #cc292b; border: 1px solid #cc292b; border-bottom: none;';
                hdr.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #cc292b; font-size:1.2rem;"></i> <strong>Certificado no válido</strong>`;
                bdy.style.padding = '0';
                bdy.innerHTML = `<div class="error-body">No se encontró ningún certificado con los datos ingresados. Revise la información e intente nuevamente.</div>`;
                
            } else {
                hdr.className = 'result-header';
                hdr.style.cssText = 'background: #fdf3f2; color: #cc292b; border: 1px solid #cc292b; border-bottom: none;';
                hdr.innerHTML = `<i class="fas fa-exclamation-circle" style="color: #cc292b; font-size:1.2rem;"></i> <strong>Respuesta inesperada</strong>`;
                bdy.style.padding = '0';
                bdy.innerHTML = `<div class="error-body">El validador arrojó una respuesta no reconocida. Intenta nuevamente en unos minutos.</div>`;
            }
            
            box.classList.add('visible');
            box.scrollIntoView({ behavior: 'smooth', block: 'start' });

        } catch(err) {
            clearTimeout(timeout);
            document.getElementById('spinner').classList.remove('active');
            
            const box = document.getElementById('result-box');
            const hdr = document.getElementById('result-header');
            const bdy = document.getElementById('result-body');
            
            hdr.className = 'result-header';
            hdr.style.cssText = 'background: #fdf3f2; color: #cc292b; border: 1px solid #cc292b; border-bottom: none;';
            hdr.innerHTML = `<i class="fas fa-wifi" style="color: #cc292b; font-size:1.2rem;"></i> <strong>Error de conexión</strong>`;
            bdy.style.padding = '0';
            bdy.innerHTML = `<div class="error-body">Hubo un problema de conexión o el servidor tardó demasiado en responder. Verifica tu internet e intenta nuevamente.</div>`;
            
            box.classList.add('visible');
        } finally {
            btn.disabled = false;
        }
    }
</script>
