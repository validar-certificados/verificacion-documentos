<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Documentos</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 16px;
            shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--text-main);
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            ring: 2px solid var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        #result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-size: 14px;
        }

        .success { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Verificador Oficial</h1>
        <p>Ingrese el código del documento para validar su autenticidad.</p>
    </div>

    <form id="verificationForm">
        <div class="form-group">
            <label for="documentId">Código de Verificación</label>
            <input type="text" id="documentId" name="documentId" placeholder="Ej: DOC-123456" required>
        </div>
        <button type="submit" id="submitBtn">Verificar Documento</button>
    </form>

    <div id="result"></div>
</div>

<script>
    const form = document.getElementById('verificationForm');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // UI State
        submitBtn.disabled = true;
        submitBtn.innerText = 'Verificando...';
        resultDiv.style.display = 'none';

        const formData = {
            documentId: document.getElementById('documentId').value,
            timestamp: new Date().toISOString()
        };

        try {
            const response = await fetch('https://hook.us2.make.com/iq6ps3txx1jaxr91mje7sx47ynbta3kb', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                // Aquí puedes personalizar el mensaje según lo que responda tu escenario de Make
                resultDiv.className = 'success';
                resultDiv.innerText = 'Solicitud enviada correctamente. El resultado se procesará en breve.';
            } else {
                throw new Error('Error en la conexión');
            }
        } catch (error) {
            resultDiv.className = 'error';
            resultDiv.innerText = 'Hubo un error al conectar con el servidor. Intente más tarde.';
        } finally {
            resultDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerText = 'Verificar Documento';
        }
    });
</script>

</body>
</html>
